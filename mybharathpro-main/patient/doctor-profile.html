<!DOCTYPE html>
<html>
<head>
<title>Find Your Doctor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="patient.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="background"></div>

<div class="page-header">
    <h2 class="page-title">Book Your Appointment</h2>
    <a href="./search-doctor.html" class="glass-btn">Back</a>
</div>

<div class="top-bar">
    <div>📍 Madurai, India</div>
    <div>🏥 Apollo Hospital</div>
</div>

<div class="categories">
    <button class="cat-btn active" data-category="Cardiology">Cardiology</button>
    <button class="cat-btn" data-category="General">General</button>
    <button class="cat-btn" data-category="Pediatrics">Pediatrics</button>
    <button class="cat-btn" data-category="Gynecology">Gynecology</button>
    <button class="cat-btn" data-category="Neurology">Neurology</button>
</div>

<h3 id="doctorCount" class="subheading">Doctors Available (0)</h3>

<div class="patient-main">

    <div class="doctor-section" id="doctorList">

        <div class="doctor-card" data-category="Cardiology">
            <div class="doctor-info-block">
                <img src="https://randomuser.me/api/portraits/men/32.jpg" class="doctor-avatar">
                <div>
                    <h3>Dr. R Kumar</h3>
                    <p>Cardiologist • 8+ Years</p>
        
                </div>
            </div>
            <div class="doctor-side">
                <button class="book-btn"
                    data-doctor="Dr. R Kumar"
                    data-speciality="Cardiologist"
                    data-experience="8+ Years"
                    data-hospital="Apollo Hospital"
                    data-location="Madurai"
                    data-fee="800">
                    View Profile
                </button>
            </div>
        </div>

        <div class="doctor-card" data-category="General">
            <div class="doctor-info-block">
                <img src="https://randomuser.me/api/portraits/women/44.jpg" class="doctor-avatar">
                <div>
                    <h3>Dr. Meena</h3>
                    <p>General Physician • 12+ Years</p>
                    <div class="slots">
                        <button class="slot-btn">09:00 AM</button>
                        <button class="slot-btn">12:00 PM</button>
                        <button class="slot-btn">03:30 PM</button>
                    </div>
                </div>
            </div>
            <div class="doctor-side">
                <p class="fee">₹500</p>
                <button class="book-btn"
                    data-doctor="Dr. Meena"
                    data-speciality="General Physician"
                    data-experience="12+ Years"
                    data-hospital="Apollo Hospital"
                    data-location="Madurai"
                    data-fee="500">
                    View Profile
                </button>
            </div>
        </div>

    </div>

    <div class="filter-box">
        <h3>Filters</h3>
        <p><input type="checkbox" class="filter-check" value="Cardiology"> Cardiology</p>
        <p><input type="checkbox" class="filter-check" value="General"> General</p>
        <p><input type="checkbox" class="filter-check" value="Pediatrics"> Pediatrics</p>
        <p><input type="checkbox" class="filter-check" value="Neurology"> Neurology</p>
    </div>

</div>

<script>
const catButtons = document.querySelectorAll(".cat-btn");
const doctorCards = document.querySelectorAll(".doctor-card");
const doctorCount = document.getElementById("doctorCount");

function updateCount(){
    let visible = document.querySelectorAll(".doctor-card:not(.hidden)").length;
    doctorCount.innerText = "Doctors Available (" + visible + ")";
}

catButtons.forEach(btn => {
    btn.addEventListener("click", () => {
        catButtons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");

        let category = btn.getAttribute("data-category");
        doctorCards.forEach(card => {
            card.classList.toggle("hidden", card.getAttribute("data-category") !== category);
        });
        updateCount();
    });
});

document.querySelectorAll(".filter-check").forEach(check => {
    check.addEventListener("change", () => {
        let selected = [...document.querySelectorAll(".filter-check:checked")].map(c => c.value);

        doctorCards.forEach(card => {
            if(selected.length === 0){
                card.classList.remove("hidden");
            } else {
                card.classList.toggle("hidden", !selected.includes(card.getAttribute("data-category")));
            }
        });

        updateCount();
    });
});

document.querySelectorAll(".book-btn").forEach(btn => {
    btn.addEventListener("click", () => {
        const doctor = btn.dataset.doctor;
        const speciality = btn.dataset.speciality;
        const experience = btn.dataset.experience;
        const hospital = btn.dataset.hospital;
        const location = btn.dataset.location;
        const fee = btn.dataset.fee;

        const url =
            `doctor-profile.html?doctor=${encodeURIComponent(doctor)}&speciality=${encodeURIComponent(speciality)}&experience=${encodeURIComponent(experience)}&hospital=${encodeURIComponent(hospital)}&location=${encodeURIComponent(location)}&fee=${encodeURIComponent(fee)}`;

        window.location.href = url;
    });
});

updateCount();
</script>

</body>
</html>
