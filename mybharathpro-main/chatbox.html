<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tamil Doctor</title>
<link rel="stylesheet" href="chatbox.css">
</head>

<body>

<div class="chat-container">

  <!-- HEADER -->
  <div class="chat-header">
    🩺 Tamil Doctor
  </div>

  <!-- CHAT AREA -->
  <div class="chat-box" id="chatBox">
    <div class="bot-msg">Vanakkam! Ungalukku enna problem?</div>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <input type="text" id="userInput" placeholder="Type in Tamil...">
    <button onclick="voiceInput()">🎤</button>
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script src="chatbox.js"></script>

</body>
</html>
